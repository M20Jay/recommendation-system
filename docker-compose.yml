
services:

  postgres:
    image: postgres:15
    container_name: recommendation_postgres
    environment:
      POSTGRES_DB: recommendations
      POSTGRES_USER: martin
      POSTGRES_PASSWORD: martin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U martin -d recommendations"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: recommendation_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://martin:martin123@postgres:5432/recommendations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

  streamlit:
    build: .
    container_name: recommendation_streamlit
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://martin:martin123@postgres:5432/recommendations
      API_URL: http://api:8000
    depends_on:
      - api
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data: