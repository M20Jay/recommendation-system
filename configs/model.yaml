# =============================================================
# configs/model.yaml
# =============================================================
# Purpose: Central configuration for all recommendation models.
# =============================================================
data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  ratings_file: "u.data"
  movies_file: "u.item"
  users_file: "u.user"
  train_file: "u1.base"
  test_file: "u1.test"

preprocessing:
  min_ratings_per_user: 20
  min_ratings_per_movie: 5
  test_size: 0.2
  random_state: 42


models:
  svd:
    n_factors: 100
    n_epochs: 20
    lr_all: 0.005
    reg_all: 0.02
    random_state: 42
  user_cf:
    k_neighbors: 40
    similarity: "cosine"
    min_support: 5
  item_cf:
    k_neighbors: 40
    similarity: "cosine"
    min_support: 5